set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-overrides ",*:Tc"

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g set-clipboard on
setw -g mode-keys vi

# Windows as browser tabs (https://www.seanh.cc/2020/12/30/how-to-make-tmux's-windows-behave-like-browser-tabs/)
# Catppuccin Mocha palette
%hidden mocha_base="#1e1e2e"
%hidden mocha_mantle="#181825"
%hidden mocha_surface0="#313244"
%hidden mocha_text="#cdd6f4"
%hidden mocha_subtext="#a6adc8"
%hidden mocha_overlay="#6c7086"
%hidden mocha_blue="#89b4fa"

set -g status-position top
set -g status-justify left
set -g status-style "bg=$mocha_mantle,fg=$mocha_text"

# Session name on the left, like the browser's app/menu button
set -g status-left "#[bg=$mocha_blue,fg=$mocha_base,bold] #S #[bg=$mocha_mantle] "
set -g status-left-length 30
set -g status-right ""

# Each window is a tab; the active tab is highlighted
set -g window-status-separator ""
set -g window-status-format "#[bg=$mocha_surface0,fg=$mocha_subtext] #I #W #[bg=$mocha_mantle] "
set -g window-status-current-format "#[bg=$mocha_blue,fg=$mocha_base,bold] #I #W #[bg=$mocha_mantle] "

# from tmux-sensible
set -g escape-time 0
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5
set -g focus-events on
setw -g aggressive-resize on

bind tab list-sessions
bind r source-file ~/.config/tmux/tmux.conf

bind-key -r p previous-window
bind-key -r n next-window

# Option+number to jump straight to a window (no prefix)
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9

bind-key v split-window -h
bind-key s split-window -v
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"
